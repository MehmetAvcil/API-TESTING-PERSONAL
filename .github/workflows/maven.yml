name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create configuration.properties from Secret
        run: |
          mkdir -p src/test/resources
          echo "${{ secrets.CONFIG_PROPERTIES }}" > src/test/resources/config.properties

      - name: Run unit tests only
        run: mvn -B test -Dtest="utilities/**/*"
