name: Unit Tests

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create configuration.properties from Secret
        run: |
          mkdir -p src/test/resources
          echo "${{ secrets.CONFIG_PROPERTIES }}" > src/test/resources/config.properties

      - name: Run unit tests only
        run: mvn -B test -Dtest="ApiUtilsTest,DataLoaderTest,ConfigReaderTest"

      - name: Merge PR if tests passed
        if: success() && github.event_name == 'pull_request'
        run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
